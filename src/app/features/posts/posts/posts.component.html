<div class="posts">
  @if (errorMessage) {
    <div class="error-message"> Ошибка: {{ errorMessage }}</div>
  } @else {
    <p-contextmenu #cm [model]="items" (onHide)="selectedPost = null" />
    <p-table
      [value]="isDataExist ? posts : artificialArray"
      [(contextMenuSelection)]="selectedPost"
      [contextMenu]="cm"
      dataKey="id"
      [tableStyle]="{ 'min-width': '50rem' }"
      [lazy]="true"
      [paginator]="true"
      [rows]="rows"
      [totalRecords]="totalPosts"
      (onLazyLoad)="loadPosts($event)"
      [rowsPerPageOptions]="[10, 25, 50]"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing { first } to { last } of { totalRecords } entries"
    >
      <ng-template #header>
        <tr>
          <th>Title</th>
          <th>Tags</th>
          <th>views</th>
        </tr>
      </ng-template>
      <ng-template #body let-post>
        <tr (dblclick)="onRowDblClick(post.id)" [pContextMenuRow]="post">
          @if (isDataExist) {
            <td>{{ post.title }}</td>
            <td>{{ post.tags }}</td>
            <td>{{ post.views }}</td>
          } @else {
            <td><p-skeleton /></td>
            <td><p-skeleton /></td>
            <td><p-skeleton /></td>
          }
        </tr>
      </ng-template>
    </p-table>
    
    <button routerLink="/posts/create">Создать пост</button>
    <p-toast />
  }
</div>
